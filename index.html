<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ABID SIR · Admin Panel</title>
    <meta name="description" content="ABID SIR – Admin Panel for premium gaming website.">
    <meta name="keywords" content="ABID SIR, admin, gaming, premium, dashboard">
    <link rel="canonical" href="https://abidsir.gaming">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* ============================================================
           ADMIN PANEL - PREMIUM GAMING DASHBOARD
           ============================================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            color: #e3e9f0;
            min-height: 100vh;
            font-family: 'Exo 2', 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .neon-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 8s ease-in-out infinite;
        }
        .neon-orb:nth-child(1) {
            width: 300px;
            height: 300px;
            background: rgba(0, 200, 255, 0.08);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }
        .neon-orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: rgba(120, 0, 255, 0.06);
            bottom: -150px;
            left: -150px;
            animation-delay: 3s;
        }
        .neon-orb:nth-child(3) {
            width: 250px;
            height: 250px;
            background: rgba(0, 255, 200, 0.05);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 6s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            25% { transform: translate(30px, -30px) scale(1.1); opacity: 0.7; }
            50% { transform: translate(-20px, 20px) scale(0.9); opacity: 0.4; }
            75% { transform: translate(15px, 15px) scale(1.05); opacity: 0.6; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0c12; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #00ccff, #0066aa); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ccff; }

        /* ===== LOGIN OVERLAY ===== */
        #passwordOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(8, 11, 18, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        #passwordOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-box {
            background: rgba(15, 26, 43, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem 2.8rem;
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 102, 170, 0.4);
            box-shadow: 0 0 80px rgba(0, 50, 100, 0.3), inset 0 0 80px rgba(0, 100, 200, 0.05);
            text-align: center;
            max-width: 440px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 200, 255, 0.05), transparent, rgba(0, 200, 255, 0.05), transparent);
            animation: rotateGlow 15s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateGlow {
            to { transform: rotate(360deg); }
        }

        .login-box>* { position: relative; z-index: 1; }

        .login-box .icon {
            font-size: 4rem;
            color: #00ccff;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 30px rgba(0, 204, 255, 0.3));
            animation: pulseGlow 2s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 204, 255, 0.3)); }
            50% { filter: drop-shadow(0 0 50px rgba(0, 204, 255, 0.6)); }
        }

        .login-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(145deg, #a0f0ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }
        .login-box .subtitle {
            color: #6a8fa8;
            font-size: 0.85rem;
            margin-bottom: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .login-box .input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }
        .login-box .input-group i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #3a6a8a;
            font-size: 1rem;
            transition: 0.3s;
            z-index: 2;
        }
        .login-box .input-group input {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 3rem;
            background: rgba(1, 10, 20, 0.8);
            border: 1px solid rgba(31, 74, 107, 0.5);
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            font-family: 'Exo 2', sans-serif;
        }
        .login-box .input-group input:focus {
            border-color: #00a6ff;
            box-shadow: 0 0 30px rgba(0, 119, 255, 0.2);
        }
        .login-box .input-group input:focus+i {
            color: #00ccff;
        }
        .login-box .input-group input::placeholder {
            color: #3a5a7a;
        }

        .login-box .input-group .toggle-pass {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #3a6a8a;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            z-index: 2;
            background: transparent;
            border: none;
            padding: 0.3rem;
        }
        .login-box .input-group .toggle-pass:hover {
            color: #00ccff;
        }

        .login-box .btn {
            background: linear-gradient(145deg, #005f9e, #0077cc);
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
            border: 1px solid rgba(0, 136, 208, 0.5);
            box-shadow: 0 0 40px rgba(0, 76, 128, 0.3);
            transition: all 0.3s;
            letter-spacing: 2px;
            font-family: 'Exo 2', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .login-box .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .login-box .btn:hover::after {
            left: 100%;
        }
        .login-box .btn:hover {
            background: linear-gradient(145deg, #0077cc, #0099ee);
            transform: scale(1.02);
            box-shadow: 0 0 60px rgba(0, 102, 204, 0.5);
        }
        .login-box .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-box .error-msg {
            color: #ff6b6b;
            margin-top: 0.8rem;
            font-weight: 500;
            min-height: 1.5rem;
            font-size: 0.9rem;
        }
        .login-box .success-msg {
            color: #4ade80;
            margin-top: 0.8rem;
            font-weight: 500;
            min-height: 1.5rem;
            font-size: 0.9rem;
        }

        .loader-ring {
            display: inline-block;
            width: 30px;
            height: 30px;
            margin: 0.3rem auto;
            border: 3px solid rgba(26, 56, 80, 0.3);
            border-top: 3px solid #00ccff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== ADMIN DASHBOARD ===== */
        .admin-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* ===== ADMIN HEADER ===== */
        .admin-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2rem;
            background: rgba(15, 26, 43, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 102, 170, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
        }
        .admin-header .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .admin-header .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(145deg, #a0f0ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .admin-header .logo i {
            font-size: 2rem;
            color: #00ccff;
        }
        .admin-header .admin-badge {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .admin-header .admin-badge .badge {
            background: rgba(0, 204, 255, 0.1);
            border: 1px solid rgba(0, 204, 255, 0.2);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #00ccff;
            letter-spacing: 1px;
        }
        .admin-header .admin-badge .badge i {
            color: #4ade80;
        }
        .logout-btn {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s;
            font-family: 'Exo 2', sans-serif;
        }
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: #ff6b6b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.1);
            transform: scale(1.05);
        }

        /* ===== STATS ROW ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(15, 26, 43, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            border: 1px solid rgba(28, 63, 89, 0.3);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 166, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 76, 122, 0.15);
        }
        .stat-card .icon {
            font-size: 2rem;
            color: #00ccff;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 204, 255, 0.05);
            border-radius: 1rem;
            border: 1px solid rgba(0, 204, 255, 0.1);
        }
        .stat-card .info h4 {
            font-size: 0.7rem;
            color: #6a8fa8;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .stat-card .info .number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ddf4ff;
        }

        /* ===== ADMIN GRID ===== */
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        /* ===== ADMIN CARDS ===== */
        .admin-card {
            background: rgba(15, 26, 43, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(28, 63, 89, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }
        .admin-card:hover {
            border-color: rgba(0, 166, 255, 0.3);
        }
        .admin-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .admin-card .card-header h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #b0d5ff;
            letter-spacing: 1px;
        }
        .admin-card .card-header h3 i {
            color: #00ccff;
            margin-right: 0.5rem;
        }
        .admin-card .card-header .live-badge {
            background: #ff0040;
            color: white;
            padding: 0.15rem 0.8rem;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulseLive 1.5s ease-in-out infinite;
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(255, 0, 64, 0.3); }
            50% { opacity: 0.6; box-shadow: 0 0 40px rgba(255, 0, 64, 0.6); }
        }

        /* ===== FORM STYLES ===== */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #6a8fa8;
            margin-bottom: 0.3rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: rgba(1, 10, 20, 0.8);
            border: 1px solid rgba(31, 74, 107, 0.4);
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
            font-family: 'Exo 2', sans-serif;
        }
        .form-group textarea {
            border-radius: 1rem;
            resize: vertical;
            min-height: 60px;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #00a6ff;
            box-shadow: 0 0 30px rgba(0, 119, 255, 0.1);
        }
        .form-group select {
            appearance: none;
            cursor: pointer;
        }
        .form-group select option {
            background: #0f1a2b;
            color: white;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-admin {
            background: linear-gradient(145deg, #005f9e, #0077cc);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 136, 208, 0.3);
            box-shadow: 0 0 30px rgba(0, 76, 128, 0.15);
            transition: all 0.3s;
            font-family: 'Exo 2', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-admin:hover {
            background: linear-gradient(145deg, #0077cc, #0099ee);
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(0, 102, 204, 0.3);
        }
        .btn-admin.success {
            background: linear-gradient(145deg, #1a5f2a, #2a8b3a);
            border-color: rgba(42, 139, 58, 0.3);
        }
        .btn-admin.success:hover {
            background: linear-gradient(145deg, #2a8b3a, #3aad4a);
        }
        .btn-admin.danger {
            background: linear-gradient(145deg, #5f1a1a, #8b2a2a);
            border-color: rgba(139, 42, 42, 0.3);
        }
        .btn-admin.danger:hover {
            background: linear-gradient(145deg, #8b2a2a, #ad3a3a);
        }
        .btn-admin.warning {
            background: linear-gradient(145deg, #5f5a1a, #8b8a2a);
            border-color: rgba(139, 138, 42, 0.3);
        }
        .btn-admin.warning:hover {
            background: linear-gradient(145deg, #8b8a2a, #adad3a);
        }
        .btn-admin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== LIST ITEMS ===== */
        .list-container {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 1rem;
            padding-right: 0.5rem;
        }
        .list-container::-webkit-scrollbar {
            width: 4px;
        }
        .list-container::-webkit-scrollbar-track {
            background: rgba(1, 10, 20, 0.3);
            border-radius: 10px;
        }
        .list-container::-webkit-scrollbar-thumb {
            background: #00a6ff;
            border-radius: 10px;
        }

        .list-item {
            background: rgba(1, 10, 20, 0.5);
            border-radius: 1.2rem;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border: 1px solid rgba(31, 74, 107, 0.2);
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .list-item:hover {
            border-color: rgba(0, 166, 255, 0.3);
            background: rgba(1, 10, 20, 0.7);
        }
        .list-item .item-info {
            flex: 1;
            min-width: 150px;
        }
        .list-item .item-info .title {
            font-weight: 600;
            color: #d8edff;
            font-size: 0.95rem;
        }
        .list-item .item-info .desc {
            font-size: 0.75rem;
            color: #7797b0;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .list-item .item-info .meta {
            font-size: 0.65rem;
            color: #3a6a8a;
            margin-top: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .list-item .item-info .meta .status {
            padding: 0.1rem 0.6rem;
            border-radius: 40px;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .list-item .item-info .meta .status.live {
            background: #ff004022;
            color: #ff6b6b;
            border: 1px solid #ff004044;
        }
        .list-item .item-info .meta .status.published {
            background: #4ade8022;
            color: #4ade80;
            border: 1px solid #4ade8044;
        }
        .list-item .item-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .list-item .item-actions .btn-sm {
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Exo 2', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .list-item .item-actions .btn-sm.edit {
            background: rgba(0, 204, 255, 0.1);
            color: #00ccff;
            border-color: rgba(0, 204, 255, 0.2);
        }
        .list-item .item-actions .btn-sm.edit:hover {
            background: rgba(0, 204, 255, 0.2);
            transform: scale(1.05);
        }
        .list-item .item-actions .btn-sm.delete {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.2);
        }
        .list-item .item-actions .btn-sm.delete:hover {
            background: rgba(255, 107, 107, 0.2);
            transform: scale(1.05);
        }
        .list-item .item-actions .btn-sm.featured {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border-color: rgba(255, 215, 0, 0.2);
        }
        .list-item .item-actions .btn-sm.featured:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.05);
        }
        .list-item .item-actions .btn-sm.featured.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #3a6a8a;
        }
        .empty-state i {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
            color: #2a4a6a;
        }
        .empty-state p {
            font-size: 0.9rem;
        }

        /* ===== SUCCESS ANIMATION ===== */
        .success-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(26, 95, 42, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(42, 139, 58, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            gap: 1rem;
            z-index: 1000;
            animation: slideUp 0.5s ease;
        }

    <script>
        // ============================================================
        // PARTICLES BACKGROUND
        // ============================================================
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let w, h;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.5;
                    this.speedY = (Math.random() - 0.5) * 0.5;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > w) this.speedX *= -1;
                    if (this.y < 0 || this.y > h) this.speedY *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 200, 255, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(); p.draw(); });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(0, 200, 255, ${0.05 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        })();

        }

        function toggleFeatured(id, featured) {
            db.collection('videos').doc(id).update({ featured: featured })
                .then(() => {
                    showToast(featured ? '⭐ Video featured!' : '⭐ Feature removed');
                })
                .catch((err) => {
                    showToast('❌ Error: ' + err.message, false);
                });
        }

        // ============================================================
        // ANNOUNCEMENT MANAGEMENT FUNCTIONS
        // ============================================================

        function addAnnouncement() {
            const text = announceText.value.trim();
            const priority = announcePriority.value;
            const status = announceStatus.value;

            if (!text) {
                announceStatusEl.textContent = '⚠️ Please enter announcement text.';
                announceStatusEl.style.color = '#ff6b6b';
                return;
            }

            showLoading('Adding announcement...');

            const announceData = {
                text: text,
                priority: priority,
                status: status,
                timestamp: Date.now(),
                date: new Date().toLocaleDateString()
            };

            db.collection('announcements').add(announceData)
                .then(() => {
                    hideLoading();
                    showToast('✅ Announcement added!');
                    announceStatusEl.textContent = '✅ Announcement added!';
                    announceStatusEl.style.color = '#4ade80';
                    announceText.value = '';
                    announcePriority.value = 'normal';
                    announceStatus.value = 'published';
                    setTimeout(() => { announceStatusEl.textContent = ''; }, 3000);
                })
                .catch((err) => {
                    hideLoading();
                    announceStatusEl.textContent = '❌ Error: ' + err.message;
                    announceStatusEl.style.color = '#ff6b6b';
                });
        }

        function updateAnnouncement() {
            if (!editingAnnounceId) return;

            const text = announceText.value.trim();
            const priority = announcePriority.value;
            const status = announceStatus.value;

            if (!text) {
                announceStatusEl.textContent = '⚠️ Please enter announcement text.';
                announceStatusEl.style.color = '#ff6b6b';
                return;
            }

            showLoading('Updating announcement...');

            const announceData = {
                text: text,
                priority: priority,
                status: status,
                updated: new Date().toLocaleDateString()
            };

            db.collection('announcements').doc(editingAnnounceId).update(announceData)
                .then(() => {
                    hideLoading();
                    showToast('✅ Announcement updated!');
                    announceStatusEl.textContent = '✅ Announcement updated!';
                    announceStatusEl.style.color = '#4ade80';
                    announceText.value = '';
                    announcePriority.value = 'normal';
                    announceStatus.value = 'published';
                    cancelAnnounceEdit();
                    setTimeout(() => { announceStatusEl.textContent = ''; }, 3000);
                })
                .catch((err) => {
                    hideLoading();
                    announceStatusEl.textContent = '❌ Error: ' + err.message;
                    announceStatusEl.style.color = '#ff6b6b';
                });
        }

        function deleteAnnouncement(id, text) {
            if (!confirm(`Delete announcement "${text}"?`)) return;

            showLoading('Deleting announcement...');

            db.collection('announcements').doc(id).delete()
                .then(() => {
                    hideLoading();
                    showToast('🗑️ Announcement deleted!');
                })
                .catch((err) => {
                    hideLoading();
                    showToast('❌ Error: ' + err.message, false);
                });
        }

        function editAnnouncement(id, data) {
            editingAnnounceId = id;
            announceText.value = data.text || '';
            announcePriority.value = data.priority || 'normal';
            announceStatus.value = data.status || 'published';
            addAnnounceBtn.style.display = 'none';
            updateAnnounceBtn.style.display = 'inline-flex';
            cancelAnnounceEditBtn.style.display = 'inline-flex';
            announceStatusEl.textContent = '✏️ Editing announcement...';
            announceStatusEl.style.color = '#fbbf24';
        }

        function cancelAnnounceEdit() {
            editingAnnounceId = null;
            announceText.value = '';
            announcePriority.value = 'normal';
            announceStatus.value = 'published';
            addAnnounceBtn.style.display = 'inline-flex';
            updateAnnounceBtn.style.display = 'none';
            cancelAnnounceEditBtn.style.display = 'none';
            announceStatusEl.textContent = '';
        }

        function renderAnnouncements(snapshot) {
            announceList.innerHTML = '';
            let count = 0;

            if (!snapshot.empty) {
                const announcements = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    announcements.push({ id: doc.id, ...data });
                });
                // Sort by timestamp descending
                announcements.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

                announcements.forEach(ann => {
                    count++;
                    const priorityColor = ann.priority === 'urgent' ? '#ff6b6b' : 
                                        ann.priority === 'high' ? '#fbbf24' : '#4ade80';
                    const priorityLabel = ann.priority === 'urgent' ? '🔴 Urgent' : 
                                        ann.priority === 'high' ? '🟡 High' : '🟢 Normal';

                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `
                        <div class="item-info">
                            <div class="title">${ann.text || 'Untitled'}</div>
                            <div class="meta">
                                <span><i class="fas fa-calendar-alt"></i> ${ann.date || 'new'}</span>
                                <span style="color:${priorityColor};">${priorityLabel}</span>
                                <span class="status ${ann.status === 'published' ? 'published' : 'draft'}">${ann.status || 'published'}</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="btn-sm edit" onclick="editAnnouncement('${ann.id}', ${JSON.stringify(ann).replace(/"/g, '&quot;')})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="btn-sm delete" onclick="deleteAnnouncement('${ann.id}','${ann.text || 'Untitled'}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `;
                    announceList.appendChild(item);
                });
            } else {
                announceList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bullhorn"></i>
                        <p>No announcements yet</p>
                    </div>
                `;
            }

            totalAnnouncements.textContent = count;
        }

        // ============================================================
        // LOAD ALL DATA
        // ============================================================
        function loadAllData() {
            // Load Videos
            db.collection('videos').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
                renderVideos(snapshot);
            }, (err) => {
                console.error('Error loading videos:', err);
            });

            // Load Announcements
            db.collection('announcements').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
                renderAnnouncements(snapshot);
            }, (err) => {
                console.error('Error loading announcements:', err);
            });

            // Load Users count (approximate)
            db.collection('users').get()
                .then((snapshot) => {
                    document.getElementById('totalUsers').textContent = snapshot.size || 0;
                })
                .catch(() => {
                    document.getElementById('totalUsers').textContent = '0';
                });
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        addVideoBtn.addEventListener('click', addVideo);
        updateVideoBtn.addEventListener('click', updateVideo);
        cancelEditBtn.addEventListener('click', cancelVideoEdit);

        addAnnounceBtn.addEventListener('click', addAnnouncement);
        updateAnnounceBtn.addEventListener('click', updateAnnouncement);
        cancelAnnounceEditBtn.addEventListener('click', cancelAnnounceEdit);

        // Enter key support for forms
        videoLink.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addVideoBtn.click();
        });
        announceText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addAnnounceBtn.click();
        });

        // Make functions globally accessible
        window.deleteVideo = deleteVideo;
        window.editVideo = editVideo;
        window.toggleFeatured = toggleFeatured;
        window.deleteAnnouncement = deleteAnnouncement;
        window.editAnnouncement = editAnnouncement;

        console.log('🔥 ABID SIR - Admin Panel Upgraded');
        console.log('🎬 Video Management with Add/Edit/Delete/Featured');
        console.log('📢 Announcement Management with Add/Edit/Delete/Priority');
        console.log('✨ All Firebase functionality UNCHANGED');
    </script>
</body>
</html>
