<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ABID SIR · Admin Panel</title>
    <meta name="description" content="ABID SIR – Admin Panel">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
        body{background:#0b0d12;color:#e3e9f0;padding:1rem;min-height:100vh;}
        
        .glass-container{max-width:1400px;width:100%;margin:0 auto;background:rgba(10,14,23,0.85);border-radius:2.5rem;padding:1.5rem;border:1px solid rgba(0,180,255,0.2);}
        .brand-bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,200,255,0.15);padding-bottom:0.8rem;margin-bottom:1rem;}
        .logo h1{font-size:2.2rem;background:linear-gradient(145deg,#a0f0ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .logo i{color:#00ccff;-webkit-text-fill-color:#00ccff;}
        .admin-badge{background:#0f1a2b;padding:0.3rem 1rem;border-radius:40px;border:1px solid #00ccff;color:#00ccff;font-size:0.8rem;}
        
        .hero-banner{background:radial-gradient(circle at 20% 30%,#0b2a3f,#03080f);border-radius:2rem;padding:1.5rem 2rem;margin-bottom:1.5rem;border:1px solid #005f8a;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;}
        .hero-text h2{font-size:1.8rem;color:#ddf0ff;}
        .hero-text h2 span{color:#00dcff;}
        .hero-text .admin-label{background:#003759;padding:0.2rem 1rem;border-radius:40px;font-size:0.7rem;color:#8bcbff;border:1px solid #0080c0;display:inline-block;}
        .cta-whatsapp{background:#1d2b3a;padding:0.5rem 1.5rem;border-radius:60px;border:1px solid #25d366;color:#25d366;text-decoration:none;display:inline-flex;align-items:center;gap:0.6rem;}
        .cta-whatsapp:hover{background:#25d366;color:#0b0d12;}
        
        .stats-grid{display:flex;flex-wrap:wrap;gap:1rem 2rem;background:#0b111e80;padding:0.5rem 1.5rem;border-radius:60px;border:1px solid #1b3349;justify-content:center;margin-bottom:1.5rem;}
        .stat-item{display:flex;align-items:center;gap:0.6rem;color:#b8d0e5;}
        .stat-item i{color:#00c3ff;}
        .stat-number{font-weight:700;background:#142433;padding:0 0.6rem;border-radius:30px;}
        
        .announce-box{background:#0d1c2b;border-left:5px solid #00b7ff;padding:0.6rem 1.5rem;border-radius:60px;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
        .announce-text{color:#c2defa;}
        .announce-text strong{color:#ffd966;}
        
        .section-title{margin:1rem 0 0.6rem 0;}
        .section-title h3{color:#b0d5ff;border-bottom:2px solid #006b9e;padding-bottom:0.2rem;display:inline-block;}
        
        .file-grid,.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem;margin-bottom:1.5rem;}
        .file-card,.video-card{background:#0f1a26;border-radius:1.5rem;padding:1rem;border:1px solid #1c3f59;transition:0.3s;position:relative;}
        .file-card:hover,.video-card:hover{transform:translateY(-4px);border-color:#00a6ff;box-shadow:0 0 30px #004c7a70;}
        .file-label,.video-label{background:#002a44;padding:0.1rem 0.8rem;border-radius:40px;display:inline-block;font-size:0.6rem;color:#8bcbff;border:1px solid #0077be;}
        .file-card h4,.video-card h4{font-size:1rem;color:#d8edff;margin:0.3rem 0;}
        .file-meta,.video-meta{display:flex;justify-content:space-between;font-size:0.7rem;color:#7797b0;}
        .file-download-btn{background:#003759;border:1px solid #0080c0;padding:0.2rem 0.8rem;border-radius:60px;font-size:0.75rem;color:#b0e0ff;cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;}
        .file-download-btn:hover{background:#0073b0;}
        
        .delete-btn{position:absolute;top:0.3rem;right:0.3rem;background:#ff6b6b22;border:1px solid #ff6b6b44;color:#ff6b6b;padding:0.1rem 0.4rem;border-radius:40px;cursor:pointer;font-size:0.5rem;opacity:0;transition:0.3s;}
        .file-card:hover .delete-btn,.video-card:hover .delete-btn{opacity:1;}
        .delete-btn:hover{background:#ff6b6b44;}
        
        .admin-panel{margin-top:2rem;background:#0d1c2b;border-radius:2rem;padding:1.5rem;border:1px solid #1f4a6b;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;}
        .admin-header h3{color:#00ccff;}
        .admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem;}
        .admin-card{background:#0f1a2b;border-radius:1.5rem;padding:1.2rem;border:1px solid #1f4a6b;}
        .admin-card .card-title{color:#8bcbff;font-size:0.8rem;font-weight:600;margin-bottom:0.8rem;}
        .admin-card .card-title i{color:#00ccff;}
        .admin-card input{width:100%;padding:0.6rem 1rem;background:#010a14;border:1px solid #1f4a6b;border-radius:40px;color:white;font-size:0.9rem;outline:none;margin-bottom:0.6rem;}
        .admin-card input:focus{border-color:#00a6ff;}
        .admin-card .btn-sm{background:#005f9e;border:none;padding:0.4rem 1.2rem;border-radius:40px;color:white;cursor:pointer;font-size:0.8rem;font-weight:600;border:1px solid #0088d0;}
        .admin-card .btn-sm:hover{background:#0080cc;}
        .admin-card .btn-sm.success{background:#1a5f2a;border-color:#2a8b3a;}
        .admin-card .btn-sm.danger{background:#5f1a1a;border-color:#8b2a2a;}
        .admin-card .btn-sm.warning{background:#5f5a1a;border-color:#8b8a2a;}
        .admin-status{font-size:0.75rem;margin-top:0.5rem;color:#6a8fa8;min-height:1.2rem;}
        .admin-status.success{color:#4ade80;}
        .admin-status.error{color:#ff6b6b;}
        
        .admin-list{max-height:250px;overflow-y:auto;margin-top:0.5rem;border-top:1px solid #1f4a6b;padding-top:0.5rem;}
        .admin-list-item{display:flex;justify-content:space-between;align-items:center;padding:0.3rem 0.5rem;border-radius:30px;font-size:0.75rem;color:#b8d0e5;border-bottom:1px solid #1f4a6b22;flex-wrap:wrap;gap:0.3rem;}
        .admin-list-item .item-text{flex:1;min-width:80px;}
        .admin-list-item .item-actions{display:flex;gap:0.3rem;}
        .admin-list-item .btn-sm{font-size:0.6rem;padding:0.1rem 0.5rem;}
        
        .footer-note{margin-top:1.5rem;text-align:center;font-size:0.75rem;color:#43647a;border-top:1px solid #162b3d;padding-top:1rem;}
        
        @media(max-width:700px){.admin-grid{grid-template-columns:1fr;}.file-grid,.video-grid{grid-template-columns:1fr 1fr;}.hero-text h2{font-size:1.4rem;}}
        @media(max-width:480px){.file-grid,.video-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>

<!-- ===== MAIN APP ===== -->
<div class="glass-container" id="mainApp">
    <div class="brand-bar">
        <div class="logo"><h1><i class="fas fa-crown"></i> ABID SIR</h1></div>
        <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
            <div class="admin-badge"><i class="fas fa-shield-alt"></i> Admin Panel</div>
        </div>
    </div>

    <div class="hero-banner">
        <div class="hero-text">
            <h2>🔥 <span>Admin</span> Dashboard</h2>
            <p>Manage content · exclusive files · daily updates</p>
            <span class="admin-label"><i class="fas fa-lock"></i> Secure Admin Area</span>
        </div>
        <a href="#" class="cta-whatsapp"><i class="fab fa-whatsapp"></i> Contact</a>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><i class="fas fa-download"></i> Downloads <span class="stat-number" id="downloadCounter">0</span></div>
        <div class="stat-item"><i class="fas fa-eye"></i> Visitors <span class="stat-number" id="visitorCounter">0</span></div>
        <div class="stat-item"><i class="fas fa-file-archive"></i> Files <span class="stat-number" id="fileCount">0</span></div>
    </div>

    <div class="announce-box">
        <i class="fas fa-bullhorn"></i>
        <div class="announce-text" id="announceText"><strong>📢</strong> Loading...</div>
    </div>

    <div class="section-title"><h3><i class="fas fa-folder-open"></i> Game Files</h3></div>
    <div class="file-grid" id="fileGrid"></div>

    <div class="section-title"><h3><i class="fas fa-video"></i> Gaming Videos</h3></div>
    <div class="video-grid" id="videoGrid"></div>

    <!-- ===== ADMIN PANEL ===== -->
    <div class="admin-panel">
        <div class="admin-header">
            <h3><i class="fas fa-user-cog"></i> Admin Controls</h3>
            <span style="background:#00ccff22;color:#00ccff;padding:0.2rem 1rem;border-radius:40px;font-size:0.7rem;"><i class="fas fa-shield-alt"></i> Full Access</span>
        </div>
        <div class="admin-grid">
            <!-- Announcement -->
            <div class="admin-card">
                <div class="card-title"><i class="fas fa-bullhorn"></i> Announcement</div>
                <input type="text" id="adminAnnounceInput" placeholder="New announcement text">
                <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                    <button class="btn-sm success" id="adminUpdateAnnounce"><i class="fas fa-save"></i> Update</button>
                    <button class="btn-sm danger" id="adminDeleteAnnounce"><i class="fas fa-trash"></i> Delete</button>
                </div>
                <div class="admin-status" id="adminAnnounceStatus"></div>
                <div class="admin-list" id="adminAnnounceList"></div>
            </div>

            <!-- Files -->
            <div class="admin-card">
                <div class="card-title"><i class="fas fa-file"></i> Manage Files</div>
                <input type="text" id="adminFileTitle" placeholder="File title">
                <input type="text" id="adminFileLabel" placeholder="Label" value="PREMIUM">
                <input type="text" id="adminFileLink" placeholder="File link (URL)">
                <input type="text" id="adminFileVersion" placeholder="Version" value="v1">
                <button class="btn-sm success" id="adminAddFile"><i class="fas fa-plus"></i> Add File</button>
                <div class="admin-status" id="adminFileStatus"></div>
                <div class="admin-list" id="adminFileList"></div>
            </div>

            <!-- Videos -->
            <div class="admin-card">
                <div class="card-title"><i class="fas fa-video"></i> Manage Videos</div>
                <input type="text" id="adminVideoTitle" placeholder="Video title">
                <input type="text" id="adminVideoLabel" placeholder="Label" value="GAMING">
                <input type="text" id="adminVideoLink" placeholder="YouTube embed URL">
                <button class="btn-sm success" id="adminAddVideo"><i class="fas fa-plus"></i> Add Video</button>
                <div class="admin-status" id="adminVideoStatus"></div>
                <div class="admin-list" id="adminVideoList"></div>
            </div>
        </div>
    </div>

    <div class="footer-note"><i class="fas fa-shield-alt"></i> ABID SIR · Admin Panel · Secure</div>
</div>

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyALnJyYqSpgZeapdNUkAKkwImgijuG935g",
    authDomain: "abid-sir-6fa1d.firebaseapp.com",
    projectId: "abid-sir-6fa1d",
    storageBucket: "abid-sir-6fa1d.firebasestorage.app",
    messagingSenderId: "870139030210",
    appId: "1:870139030210:web:5237413bfcf9ba0c59a95b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.enablePersistence({ synchronizeTabs: true }).catch(() => {});

// ========== DOM REFS ==========
const adminAnnounceInput = document.getElementById('adminAnnounceInput');
const adminUpdateAnnounce = document.getElementById('adminUpdateAnnounce');
const adminDeleteAnnounce = document.getElementById('adminDeleteAnnounce');
const adminAnnounceStatus = document.getElementById('adminAnnounceStatus');

const adminFileTitle = document.getElementById('adminFileTitle');
const adminFileLabel = document.getElementById('adminFileLabel');
const adminFileLink = document.getElementById('adminFileLink');
const adminFileVersion = document.getElementById('adminFileVersion');
const adminAddFile = document.getElementById('adminAddFile');
const adminFileStatus = document.getElementById('adminFileStatus');
const adminFileList = document.getElementById('adminFileList');

const adminVideoTitle = document.getElementById('adminVideoTitle');
const adminVideoLabel = document.getElementById('adminVideoLabel');
const adminVideoLink = document.getElementById('adminVideoLink');
const adminAddVideo = document.getElementById('adminAddVideo');
const adminVideoStatus = document.getElementById('adminVideoStatus');
const adminVideoList = document.getElementById('adminVideoList');

let currentAnnouncementId = null;

// ============================================================
// ANNOUNCEMENT FUNCTIONS
// ============================================================

adminUpdateAnnounce.addEventListener('click', function() {
    const text = adminAnnounceInput.value.trim();
    if (!text) {
        adminAnnounceStatus.textContent = '⚠️ Please enter text.';
        adminAnnounceStatus.className = 'admin-status error';
        return;
    }
    
    const announceData = { text: text, timestamp: Date.now() };
    
    if (currentAnnouncementId) {
        db.collection('content').doc('announcement').update(announceData)
            .then(() => {
                adminAnnounceStatus.textContent = '✅ Announcement updated!';
                adminAnnounceStatus.className = 'admin-status success';
                adminAnnounceInput.value = '';
                setTimeout(() => { adminAnnounceStatus.textContent = ''; }, 3000);
            })
            .catch((err) => {
                adminAnnounceStatus.textContent = '❌ ' + err.message;
                adminAnnounceStatus.className = 'admin-status error';
            });
    } else {
        db.collection('content').doc('announcement').set(announceData)
            .then(() => {
                adminAnnounceStatus.textContent = '✅ Announcement created!';
                adminAnnounceStatus.className = 'admin-status success';
                adminAnnounceInput.value = '';
                setTimeout(() => { adminAnnounceStatus.textContent = ''; }, 3000);
            })
            .catch((err) => {
                adminAnnounceStatus.textContent = '❌ ' + err.message;
                adminAnnounceStatus.className = 'admin-status error';
            });
    }
});

adminDeleteAnnounce.addEventListener('click', function() {
    if (!currentAnnouncementId) {
        adminAnnounceStatus.textContent = '⚠️ No announcement to delete.';
        adminAnnounceStatus.className = 'admin-status error';
        return;
    }
    
    if (!confirm('Delete current announcement?')) return;
    
    db.collection('content').doc('announcement').delete()
        .then(() => {
            currentAnnouncementId = null;
            adminAnnounceStatus.textContent = '✅ Announcement deleted!';
            adminAnnounceStatus.className = 'admin-status success';
            adminAnnounceInput.value = '';
            document.getElementById('announceText').innerHTML = '<strong>📢</strong> No announcement';
            setTimeout(() => { adminAnnounceStatus.textContent = ''; }, 3000);
        })
        .catch((err) => {
            adminAnnounceStatus.textContent = '❌ ' + err.message;
            adminAnnounceStatus.className = 'admin-status error';
        });
});

// ============================================================
// FILE & VIDEO FUNCTIONS
// ============================================================

adminAddFile.addEventListener('click', function() {
    const title = adminFileTitle.value.trim();
    const label = adminFileLabel.value.trim() || 'PREMIUM';
    const link = adminFileLink.value.trim();
    const version = adminFileVersion.value.trim() || 'v1';
    
    if (!title || !link) {
        adminFileStatus.textContent = '⚠️ Title and link required.';
        adminFileStatus.className = 'admin-status error';
        return;
    }
    
    db.collection('files').add({
        title: title,
        label: label,
        fileLink: link,
        version: version,
        downloads: 0,
        timestamp: Date.now(),
        updated: new Date().toLocaleDateString()
    }).then(() => {
        adminFileStatus.textContent = '✅ File added!';
        adminFileStatus.className = 'admin-status success';
        adminFileTitle.value = '';
        adminFileLink.value = '';
        setTimeout(() => { adminFileStatus.textContent = ''; }, 3000);
    }).catch((err) => {
        adminFileStatus.textContent = '❌ ' + err.message;
        adminFileStatus.className = 'admin-status error';
    });
});

adminAddVideo.addEventListener('click', function() {
    const title = adminVideoTitle.value.trim();
    const label = adminVideoLabel.value.trim() || 'GAMING';
    const link = adminVideoLink.value.trim();
    if (!title || !link) {
        adminVideoStatus.textContent = '⚠️ Title and link required.';
        adminVideoStatus.className = 'admin-status error';
        return;
    }
    db.collection('videos').add({
        title: title,
        label: label,
        videoLink: link,
        views: 0,
        timestamp: Date.now(),
        date: new Date().toLocaleDateString()
    }).then(() => {
        adminVideoStatus.textContent = '✅ Video added!';
        adminVideoStatus.className = 'admin-status success';
        adminVideoTitle.value = '';
        adminVideoLink.value = '';
        setTimeout(() => { adminVideoStatus.textContent = ''; }, 3000);
    }).catch((err) => {
        adminVideoStatus.textContent = '❌ ' + err.message;
        adminVideoStatus.className = 'admin-status error';
    });
});

function deleteFile(id, title) {
    if (confirm(`Delete "${title}"?`)) {
        db.collection('files').doc(id).delete().catch(() => {});
    }
}

function deleteVideo(id, title) {
    if (confirm(`Delete "${title}"?`)) {
        db.collection('videos').doc(id).delete().catch(() => {});
    }
}

window.deleteFile = deleteFile;
window.deleteVideo = deleteVideo;

// ============================================================
// LOAD DATA
// ============================================================
function loadAllData() {
    // Announcement
    db.collection('content').doc('announcement').onSnapshot((doc) => {
        const el = document.getElementById('announceText');
        if (doc.exists) {
            const data = doc.data();
            currentAnnouncementId = doc.id;
            el.innerHTML = `<strong>📢</strong> ${data.text || 'Welcome!'}`;
            adminAnnounceInput.value = data.text || '';
        } else {
            currentAnnouncementId = null;
            el.innerHTML = '<strong>📢</strong> No announcement';
            adminAnnounceInput.value = '';
        }
    }, () => {});

    // Files
    db.collection('files').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
        const grid = document.getElementById('fileGrid');
        grid.innerHTML = '';
        adminFileList.innerHTML = '';
        let count = 0;
        
        if (!snapshot.empty) {
            snapshot.forEach(doc => {
                const file = doc.data();
                const id = doc.id;
                count++;
                
                const card = document.createElement('div');
                card.className = 'file-card';
                card.innerHTML = `
                    <div class="file-label"><i class="fas fa-tag"></i> ${file.label || 'PREMIUM'}</div>
                    <h4>${file.title || 'Untitled'}</h4>
                    <div class="file-meta"><span>${file.version || 'v1'}</span> <span>${file.size || '—'}</span></div>
                    <div class="file-download-btn" data-id="${id}" data-link="${file.fileLink || '#'}">
                        <i class="fas fa-download"></i> ${file.downloads || 0}
                    </div>
                    <button class="delete-btn" onclick="deleteFile('${id}','${file.title}')"><i class="fas fa-trash"></i></button>
                `;
                grid.appendChild(card);
                
                const item = document.createElement('div');
                item.className = 'admin-list-item';
                item.innerHTML = `
                    <div class="item-text">📄 ${file.title || 'Untitled'}</div>
                    <div class="item-actions">
                        <button class="btn-sm danger" style="padding:0.1rem 0.5rem;font-size:0.6rem;" onclick="deleteFile('${id}','${file.title}')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                adminFileList.appendChild(item);
            });
            document.getElementById('fileCount').textContent = count;
            
            document.querySelectorAll('.file-download-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const link = this.dataset.link;
                    const id = this.dataset.id;
                    if (id) db.collection('files').doc(id).update({ downloads: firebase.firestore.FieldValue.increment(1) }).catch(() => {});
                    db.collection('counters').doc('stats').update({ downloads: firebase.firestore.FieldValue.increment(1) }).catch(() => {});
                    if (link && link !== '#') window.open(link, '_blank');
                    else alert('⬇️ Download started!');
                });
            });
        } else {
            document.getElementById('fileCount').textContent = '0';
            adminFileList.innerHTML = `<div style="color:#3a6a8a;font-size:0.7rem;text-align:center;padding:0.5rem;">No files</div>`;
        }
    }, () => {});

    // Videos
    db.collection('videos').orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '';
        adminVideoList.innerHTML = '';
        
        if (!snapshot.empty) {
            snapshot.forEach(doc => {
                const vid = doc.data();
                const id = doc.id;
                const videoUrl = vid.videoLink || '';
                const isEmbed = videoUrl.includes('youtube.com/embed');
                
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-label"><i class="fas fa-play"></i> ${vid.label || 'GAMING'}</div>
                    <h4>${vid.title || 'Video'}</h4>
                    ${isEmbed ? `<div style="aspect-ratio:16/9;background:#000;border-radius:0.8rem;margin:0.3rem 0;"><iframe src="${videoUrl}" style="width:100%;height:100%;border:none;border-radius:0.8rem;" allowfullscreen loading="lazy"></iframe></div>` 
                              : videoUrl ? `<div style="aspect-ratio:16/9;background:#0a1a2a;border-radius:0.8rem;margin:0.3rem 0;display:flex;align-items:center;justify-content:center;"><a href="${videoUrl}" target="_blank" style="color:#00ccff;"><i class="fas fa-play-circle" style="font-size:2rem;"></i></a></div>`
                              : `<div style="aspect-ratio:16/9;background:#0a1a2a;border-radius:0.8rem;margin:0.3rem 0;display:flex;align-items:center;justify-content:center;color:#3d7a9a;"><i class="fas fa-film" style="font-size:1.5rem;"></i></div>`}
                    <button class="delete-btn" onclick="deleteVideo('${id}','${vid.title}')"><i class="fas fa-trash"></i></button>
                `;
                grid.appendChild(card);
                
                const item = document.createElement('div');
                item.className = 'admin-list-item';
                item.innerHTML = `
                    <div class="item-text">🎬 ${vid.title || 'Untitled'}</div>
                    <div class="item-actions">
                        <button class="btn-sm danger" style="padding:0.1rem 0.5rem;font-size:0.6rem;" onclick="deleteVideo('${id}','${vid.title}')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                adminVideoList.appendChild(item);
            });
        } else {
            adminVideoList.innerHTML = `<div style="color:#3a6a8a;font-size:0.7rem;text-align:center;padding:0.5rem;">No videos</div>`;
        }
    }, () => {});

    // Counters
    db.collection('counters').doc('stats').update({ visitors: firebase.firestore.FieldValue.increment(1) }).catch(() => {});
    db.collection('counters').doc('stats').onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();
            if (data.visitors) document.getElementById('visitorCounter').textContent = data.visitors.toLocaleString();
            if (data.downloads) document.getElementById('downloadCounter').textContent = data.downloads.toLocaleString();
        }
    }, () => {});
